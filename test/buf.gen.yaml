version: v2
plugins:
  - local:
      - go
      - run
      - github.com/wasilibs/go-protoc-gen-builtins/cmd/protoc-gen-python@v1.34.1
    out: .
  - local:
      - go
      - run
      - github.com/wasilibs/go-protoc-gen-builtins/cmd/protoc-gen-pyi@v1.34.1
    out: .
  - local:
      - go
      - run
      - github.com/connectrpc/connect-python/protoc-gen-connect-python@fd83a6fd23613721a86e2b823671c0798c7cb033
    out: .
    opt:
      - imports=relative
